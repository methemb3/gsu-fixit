<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSU FixIt — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gsu-gold: #FFB81C;
    --gsu-red: #C8102E;
    --text-dark: #202124;
    --text-light: #5F6368;
    --bg-main: #FFFFFF;
    --bg-alt: #F8F9FA;
    --border: #DADCE0;
    --font-main: 'Product Sans', 'Lexend', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-main); background: var(--bg-alt); color: var(--text-dark); min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo { font-size: 1.25rem; font-weight: 800; }
  .topbar-logo span { color: var(--gsu-gold); }
  .topbar-badge { display: inline-block; background: #FFF1F2; color: var(--gsu-red); font-size: 0.65rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; margin-left: 8px; letter-spacing: 0.5px; text-transform: uppercase; vertical-align: middle; }
  .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
  .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: var(--text-light); }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #34A853; flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .btn-logout { background: none; border: 1px solid var(--border); padding: 7px 16px; border-radius: 6px; font-family: inherit; font-size: 0.82rem; cursor: pointer; color: var(--gsu-red); font-weight: 600; transition: 0.2s; }
  .btn-logout:hover { background: #FFF1F2; }

  /* ── MAIN CONTENT ── */
  .main-wrapper { padding: 2rem 2.5rem; }

  .page-header { margin-bottom: 2rem; }
  .page-header h1 { font-size: 2rem; letter-spacing: -0.5px; }
  .page-header p { color: var(--text-light); margin-top: 0.25rem; }

  /* ── STAT CARDS ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .stat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin-bottom: 0.4rem; }
  .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; }
  .stat-card.gold  .stat-value { color: var(--gsu-gold); }
  .stat-card.red   .stat-value { color: var(--gsu-red); }
  .stat-card.blue  .stat-value { color: #1565C0; }
  .stat-card.green .stat-value { color: #2E7D32; }

  /* ── FILTER BAR ── */
  .filter-bar { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.85rem; background: var(--bg-alt); outline: none; cursor: pointer; color: var(--text-dark); }
  .filter-select:focus { border-color: var(--gsu-gold); }

  /* ── TABLE ── */
  .table-card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .table-header h3 { font-size: 1rem; font-weight: 700; }
  .order-count { font-size: 0.8rem; color: var(--text-light); }

  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 12px 16px; text-align: left; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-light); border-bottom: 1px solid var(--border); background: var(--bg-alt); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAFA; }
  td { padding: 14px 16px; font-size: 0.88rem; vertical-align: middle; }

  /* Priority chips */
  .chip { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
  .chip-low       { background: #E8F5E9; color: #2E7D32; }
  .chip-medium    { background: #FFF8E1; color: #F57F17; }
  .chip-high      { background: #FBE9E7; color: #BF360C; }

  /* Status dropdown */
  .status-select { padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: 0.78rem; font-weight: 700; border: 1.5px solid; cursor: pointer; outline: none; transition: 0.2s; }
  .status-pending  { border-color: #F9A825; color: #F57F17; background: #FFF8E1; }
  .status-progress { border-color: #1565C0; color: #1565C0; background: #E3F2FD; }
  .status-done     { border-color: #2E7D32; color: #2E7D32; background: #E8F5E9; }
  .status-cancel   { border-color: #9E9E9E; color: #757575; background: #F5F5F5; }

  /* Empty state */
  .empty-state { padding: 4rem; text-align: center; color: var(--text-light); }
  .empty-state .big { font-size: 3rem; margin-bottom: 1rem; }

  /* Toast */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: #202124; color: white; padding: 12px 20px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.success { background: #2E7D32; }
  .toast.error   { background: #C8102E; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<header class="topbar">
  <div>
    <span class="topbar-logo">GSU <span>FixIt</span><span class="topbar-badge">Admin</span></span>
  </div>
  <div class="topbar-right">
    <div class="live-indicator"><span class="live-dot"></span> Live — updates every 3s</div>
    <button class="btn-logout" onclick="admin.logout()">← Logout</button>
  </div>
</header>

<!-- MAIN -->
<div class="main-wrapper">

  <div class="page-header">
    <h1>Work Orders</h1>
    <p style="color:var(--text-light)">All incoming maintenance requests from student residents.</p>
  </div>

  <!-- STAT CARDS -->
  <div class="stats-row">
    <div class="stat-card gold"><div class="stat-label">Total Orders</div><div class="stat-value" id="stat-total">—</div></div>
    <div class="stat-card red"><div class="stat-label">Pending Review</div><div class="stat-value" id="stat-pending">—</div></div>
    <div class="stat-card blue"><div class="stat-label">In Progress</div><div class="stat-value" id="stat-progress">—</div></div>
    <div class="stat-card green"><div class="stat-label">Completed</div><div class="stat-value" id="stat-done">—</div></div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <select class="filter-select" id="filter-status" onchange="admin.applyFilter()">
      <option value="all">All Statuses</option>
      <option value="Pending Review">Pending Review</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <select class="filter-select" id="filter-cat" onchange="admin.applyFilter()">
      <option value="all">All Categories</option>
      <option value="Plumbing">Plumbing</option>
      <option value="Electrical">Electrical</option>
      <option value="HVAC / Air">HVAC / Air</option>
      <option value="Furniture">Furniture</option>
      <option value="Appliances">Appliances</option>
      <option value="Pest Control">Pest Control</option>
    </select>
    <select class="filter-select" id="filter-prio" onchange="admin.applyFilter()">
      <option value="all">All Priorities</option>
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <h3>Work Orders</h3>
      <span class="order-count" id="order-count"></span>
    </div>
    <div id="table-body">
      <div class="empty-state"><div class="big">📋</div><p>Loading orders…</p></div>
    </div>
  </div>

</div>

<script>
const API = "https://gsufixit.pythonanywhere.com/api";
let allOrders = [];

// ── Session check ────────────────────────────────────────────────────────────
(function() {
  const authed = sessionStorage.getItem('fixit_authed');
  const role   = sessionStorage.getItem('fixit_role');
  if (!authed || role !== 'admin') {
    window.location.href = 'index.html';
  }
})();

// ── Toast helper ─────────────────────────────────────────────────────────────
function toast(msg, type='', duration=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => { t.className = 'toast'; }, duration);
}

// ── Style helpers ─────────────────────────────────────────────────────────────
function prioClass(p) {
  if (p==="Low")    return "chip chip-low";
  if (p==="Medium") return "chip chip-medium";
  if (p==="High")   return "chip chip-high";
  return "chip chip-low";
}

function statusClass(s) {
  if (s==="Pending Review") return "status-select status-pending";
  if (s==="In Progress")    return "status-select status-progress";
  if (s==="Completed")      return "status-select status-done";
  return "status-select status-cancel";
}

const admin = {

  logout() {
    sessionStorage.clear();
    window.location.href = 'index.html';
  },

  // FIX (Change 2): loadOrders populates allOrders THEN calls applyFilter
  async loadOrders() {
    try {
      const res = await fetch(`${API}/orders`);
      allOrders = await res.json();
      this.updateStats();
      this.applyFilter();          // only called after allOrders is populated
    } catch {}
  },

  updateStats() {
    let pending=0, progress=0, done=0;
    allOrders.forEach(o => {
      if (o.status==="Pending Review") pending++;
      if (o.status==="In Progress")    progress++;
      if (o.status==="Completed")      done++;
    });
    document.getElementById('stat-total').textContent    = allOrders.length;
    document.getElementById('stat-pending').textContent  = pending;
    document.getElementById('stat-progress').textContent = progress;
    document.getElementById('stat-done').textContent     = done;
  },

  // FIX (Change 2): filter dropdowns default to "all", table renders immediately
  applyFilter() {
    const sf = document.getElementById('filter-status').value;  // defaults to "all"
    const cf = document.getElementById('filter-cat').value;
    const pf = document.getElementById('filter-prio').value;
    const filtered = allOrders.filter(o =>
      (sf==='all' || o.status===sf) &&
      (cf==='all' || o.category===cf) &&
      (pf==='all' || o.priority===pf)
    );
    document.getElementById('order-count').textContent = `${filtered.length} order${filtered.length!==1?'s':''}`;
    this.renderTable(filtered);
  },

  renderTable(orders) {
    const container = document.getElementById('table-body');
    if (!orders.length) {
      container.innerHTML = `<div class="empty-state"><div class="big">📋</div><p>No orders match the selected filters.</p></div>`;
      return;
    }
    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Submitted</th>
            <th>Category</th>
            <th>Dorm</th>
            <th>Room</th>
            <th>Student G#</th>
            <th>Priority</th>
            <th>Description</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${orders.map(o=>`
            <tr>
              <td><b style="color:var(--gsu-gold)">${o.order_id}</b></td>
              <td style="color:var(--text-light);font-size:0.8rem">${o.created_at}</td>
              <td>${o.category}</td>
              <td>${o.dorm_name}</td>
              <td>${o.room_number}</td>
              <td style="color:var(--text-light)">${o.submitted_by}</td>
              <td><span class="${prioClass(o.priority)}">${o.priority}</span></td>
              <td style="max-width:200px;color:var(--text-light);font-size:0.82rem">${o.description}</td>
              <td>
                <select class="${statusClass(o.status)}" onchange="admin.updateStatus('${o.order_id}',this)">
                  <option ${o.status==='Pending Review'?'selected':''}>Pending Review</option>
                  <option ${o.status==='In Progress'?'selected':''}>In Progress</option>
                  <option ${o.status==='Completed'?'selected':''}>Completed</option>
                  <option ${o.status==='Cancelled'?'selected':''}>Cancelled</option>
                </select>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  },

  // FIX (Change 3): separate JSON parse from fetch, treat 200/204 as success
  async updateStatus(orderId, selectEl) {
    const newStatus = selectEl.value;
    selectEl.className = statusClass(newStatus);
    try {
      const res = await fetch(`${API}/orders/${orderId}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus })
      });

      // Treat any 2xx response as success — don't rely solely on JSON body
      if (res.ok) {
        // Try to parse JSON, but don't fail if body is empty
        let data = { success: true };
        try { data = await res.json(); } catch {}

        if (data.success !== false) {
          toast(`✅ ${orderId} → ${newStatus}`, 'success');
          const order = allOrders.find(o => o.order_id === orderId);
          if (order) order.status = newStatus;
          this.updateStats();
          return;
        }
      }
      toast(`⚠️ Could not update ${orderId}. Try again.`, 'error');
    } catch {
      toast("⚠️ Could not update — check your connection.", 'error');
    }
  }
};

// ── Boot: load immediately, then poll every 3s ───────────────────────────────
admin.loadOrders();
setInterval(() => admin.loadOrders(), 3000);
</script>
</body>
</html>
