<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSU FixIt — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gsu-gold: #FFB81C;
    --gsu-red: #C8102E;
    --text-dark: #202124;
    --text-light: #5F6368;
    --bg-main: #F8F9FA;
    --bg-card: #FFFFFF;
    --border: #DADCE0;
    --font-main: 'Lexend', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-main); background: var(--bg-main); color: var(--text-dark); min-height: 100vh; }

  /* ── AUTH ── */
  .auth-overlay { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; align-items: center; justify-content: center; }
  .auth-card { width: 100%; max-width: 400px; padding: 2.5rem; border: 1px solid var(--border); border-radius: 16px; background: white; }
  .auth-card h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.25rem; }
  .auth-card p { color: var(--text-light); margin-bottom: 2rem; font-size: 0.9rem; }
  .form-input { width: 100%; padding: 13px 16px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none; background: var(--bg-main); }
  .form-input:focus { border-color: var(--gsu-red); background: white; }
  .btn-red { background: var(--gsu-red); color: white; border: none; padding: 13px 28px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 1rem; transition: 0.2s; font-family: inherit; }
  .btn-red:hover { background: #a50d24; transform: translateY(-1px); }
  .error-msg { color: var(--gsu-red); font-size: 0.85rem; margin-top: 0.75rem; text-align: center; display: none; }

  /* ── TOPBAR ── */
  .topbar { background: white; border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-size: 1.4rem; font-weight: 800; }
  .topbar-logo span { color: var(--gsu-gold); }
  .topbar-logo em { color: var(--gsu-red); font-style: normal; font-size: 0.75rem; background: #FFF1F2; padding: 3px 10px; border-radius: 20px; margin-left: 10px; }
  .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #34A853; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .btn-logout { background: none; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-family: inherit; font-size: 0.85rem; cursor: pointer; color: var(--text-light); transition: 0.2s; }
  .btn-logout:hover { border-color: var(--gsu-red); color: var(--gsu-red); }

  /* ── LAYOUT ── */
  .dashboard { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* ── STAT CARDS ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .stat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin-bottom: 0.5rem; }
  .stat-value { font-size: 2rem; font-weight: 800; line-height: 1; }
  .stat-card.gold  .stat-value { color: var(--gsu-gold); }
  .stat-card.blue  .stat-value { color: #1565C0; }
  .stat-card.green .stat-value { color: #2E7D32; }
  .stat-card.red   .stat-value { color: var(--gsu-red); }

  /* ── FILTER BAR ── */
  .filter-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  .filter-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.85rem; background: var(--bg-main); outline: none; cursor: pointer; }
  .filter-select:focus { border-color: var(--gsu-gold); }
  .filter-label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; }

  /* ── TABLE ── */
  .table-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .table-header h3 { font-size: 1rem; font-weight: 700; }
  
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 12px 16px; text-align: left; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-light); border-bottom: 1px solid var(--border); background: var(--bg-main); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAFA; }
  td { padding: 14px 16px; font-size: 0.88rem; vertical-align: middle; }

  /* Priority chips */
  .chip { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
  .chip-low       { background: #E8F5E9; color: #2E7D32; }
  .chip-medium    { background: #FFF8E1; color: #F57F17; }
  .chip-high      { background: #FBE9E7; color: #BF360C; }
  .chip-emergency { background: #FCE4EC; color: #880E4F; }

  /* Status dropdown */
  .status-select { padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: 0.78rem; font-weight: 700; border: 1.5px solid; cursor: pointer; outline: none; transition: 0.2s; }
  .status-pending  { border-color: #F9A825; color: #F57F17; background: #FFF8E1; }
  .status-progress { border-color: #1565C0; color: #1565C0; background: #E3F2FD; }
  .status-done     { border-color: #2E7D32; color: #2E7D32; background: #E8F5E9; }
  .status-cancel   { border-color: #9E9E9E; color: #757575; background: #FAFAFA; }

  /* Empty state */
  .empty-state { padding: 4rem; text-align: center; color: var(--text-light); }
  .empty-state .big { font-size: 3rem; margin-bottom: 1rem; }

  /* Toast */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: #202124; color: white; padding: 12px 20px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- AUTH -->
<div id="auth-overlay" class="auth-overlay">
  <div class="auth-card">
    <div style="font-size: 2.5rem; margin-bottom: 1rem;">🛠️</div>
    <h1>Admin Portal</h1>
    <p>GSU FixIt — Maintenance Management</p>
    <input type="text" id="admin-user" class="form-input" placeholder="Username">
    <input type="password" id="admin-pass" class="form-input" placeholder="Password" onkeydown="if(event.key==='Enter') admin.login()">
    <button class="btn-red" onclick="admin.login()">Sign In →</button>
    <div class="error-msg" id="auth-error">Invalid credentials. Please try again.</div>
  </div>
</div>

<!-- TOPBAR -->
<header class="topbar hidden" id="topbar">
  <div class="topbar-logo">
    GSU <span>FixIt</span>
    <em>Admin</em>
  </div>
  <div class="topbar-right">
    <span style="font-size:0.85rem; color:var(--text-light)">
      <span class="live-dot"></span>Live Updates
    </span>
    <button class="btn-logout" onclick="location.reload()">Logout</button>
  </div>
</header>

<!-- DASHBOARD -->
<div class="dashboard hidden" id="dashboard">

  <!-- STAT CARDS -->
  <div class="stats-row">
    <div class="stat-card gold">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Pending Review</div>
      <div class="stat-value" id="stat-pending">0</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">In Progress</div>
      <div class="stat-value" id="stat-progress">0</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="stat-done">0</div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <select class="filter-select" id="filter-status" onchange="admin.applyFilter()">
      <option value="all">All Statuses</option>
      <option value="Pending Review">Pending Review</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <select class="filter-select" id="filter-cat" onchange="admin.applyFilter()">
      <option value="all">All Categories</option>
      <option>Plumbing</option>
      <option>Electrical</option>
      <option>HVAC / Air</option>
      <option>Furniture</option>
      <option>Appliances</option>
      <option>Pest Control</option>
    </select>
    <select class="filter-select" id="filter-prio" onchange="admin.applyFilter()">
      <option value="all">All Priorities</option>
      <option value="Emergency">Emergency</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header">
      <h3>Work Orders</h3>
      <span id="order-count" style="font-size:0.8rem;color:var(--text-light)">0 orders</span>
    </div>
    <div id="table-body">
      <div class="empty-state">
        <div class="big">📋</div>
        <p>No work orders yet. Waiting for student submissions...</p>
      </div>
    </div>
  </div>

</div>

<script>
const API = "https://gsufixit.pythonanywhere.com/api";
let allOrders = [];
let pollTimer = null;

// ── HELPERS ──────────────────────────────────────────────────
function toast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function prioClass(p) {
  const map = { Low: 'chip-low', Medium: 'chip-medium', High: 'chip-high', Emergency: 'chip-emergency' };
  return 'chip ' + (map[p] || 'chip-low');
}

function statusClass(s) {
  if (s === "Pending Review") return "status-select status-pending";
  if (s === "In Progress")   return "status-select status-progress";
  if (s === "Completed")     return "status-select status-done";
  return "status-select status-cancel";
}

// ── ADMIN ─────────────────────────────────────────────────────
const admin = {

  async login() {
    const user = document.getElementById('admin-user').value.trim();
    const pass = document.getElementById('admin-pass').value.trim();
    const errEl = document.getElementById('auth-error');
    errEl.style.display = 'none';

    try {
      const res = await fetch(`${API}/admin/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('auth-overlay').classList.add('hidden');
        document.getElementById('topbar').classList.remove('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        this.loadOrders();
        pollTimer = setInterval(() => this.loadOrders(), 3000);
      } else {
        errEl.style.display = 'block';
      }
    } catch {
      errEl.textContent = "Cannot reach server. Is fixit_backend.py running?";
      errEl.style.display = 'block';
    }
  },

  async loadOrders() {
    try {
      const res = await fetch(`${API}/orders`);
      allOrders = await res.json();
      this.updateStats();
      this.applyFilter();
    } catch { /* server offline */ }
  },

  updateStats() {
    const counts = { total: allOrders.length, pending: 0, progress: 0, done: 0 };
    allOrders.forEach(o => {
      if (o.status === "Pending Review") counts.pending++;
      if (o.status === "In Progress")   counts.progress++;
      if (o.status === "Completed")     counts.done++;
    });
    document.getElementById('stat-total').textContent    = counts.total;
    document.getElementById('stat-pending').textContent  = counts.pending;
    document.getElementById('stat-progress').textContent = counts.progress;
    document.getElementById('stat-done').textContent     = counts.done;
  },

  applyFilter() {
    const statusF = document.getElementById('filter-status').value;
    const catF    = document.getElementById('filter-cat').value;
    const prioF   = document.getElementById('filter-prio').value;

    let filtered = allOrders.filter(o => {
      const matchStatus = statusF === 'all' || o.status === statusF;
      const matchCat    = catF === 'all'    || o.category === catF;
      const matchPrio   = prioF === 'all'   || o.priority === prioF;
      return matchStatus && matchCat && matchPrio;
    });

    document.getElementById('order-count').textContent = `${filtered.length} order${filtered.length !== 1 ? 's' : ''}`;
    this.renderTable(filtered);
  },

  renderTable(orders) {
    const container = document.getElementById('table-body');

    if (!orders.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="big">📋</div>
          <p>No orders match the selected filters.</p>
        </div>`;
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Submitted</th>
            <th>Category</th>
            <th>Dorm</th>
            <th>Room</th>
            <th>Student (G#)</th>
            <th>Priority</th>
            <th>Description</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${orders.map(o => `
            <tr>
              <td><b style="color:var(--gsu-gold)">${o.order_id}</b></td>
              <td style="color:var(--text-light);font-size:0.8rem">${o.created_at}</td>
              <td>${o.category}</td>
              <td>${o.dorm_name}</td>
              <td>${o.room_number}</td>
              <td style="color:var(--text-light)">${o.submitted_by}</td>
              <td><span class="${prioClass(o.priority)}">${o.priority}</span></td>
              <td style="max-width:220px;color:var(--text-light);font-size:0.82rem">${o.description}</td>
              <td>
                <select class="${statusClass(o.status)}" 
                        onchange="admin.updateStatus('${o.order_id}', this)"
                        data-id="${o.order_id}">
                  <option ${o.status==='Pending Review' ?'selected':''}>Pending Review</option>
                  <option ${o.status==='In Progress'   ?'selected':''}>In Progress</option>
                  <option ${o.status==='Completed'     ?'selected':''}>Completed</option>
                  <option ${o.status==='Cancelled'     ?'selected':''}>Cancelled</option>
                </select>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  },

  async updateStatus(orderId, selectEl) {
    const newStatus = selectEl.value;

    // Update class immediately for visual feedback
    selectEl.className = statusClass(newStatus);

    try {
      const res = await fetch(`${API}/orders/${orderId}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus })
      });
      const data = await res.json();
      if (data.success) {
        toast(`✅ ${orderId} → ${newStatus}`);
        // Update local data so stats refresh correctly
        const order = allOrders.find(o => o.order_id === orderId);
        if (order) order.status = newStatus;
        this.updateStats();
      }
    } catch {
      toast("⚠️ Could not update — server may be offline.");
    }
  }
};
</script>
</body>
</html>
